default: ollama/ministral-3:14b
alternative: ollama/ministral-3:14b

complexity_inference_mode: double
git_strategy: auto

heartbeats_scale_factor: 1

# Global LLM defaults applied to all agents unless overridden below.
llm_defaults:
  temperature: 1.0
  max_tokens: 8128
  num_ctx: 8192

# Per-agent overrides. Only fields listed here are overridden;
# everything else falls back to llm_defaults.
#
# Roles:
#   intent_classifier    — classifies user intent (greetings/question/plan/chat)
#   complexity_evaluator — decides default vs alternative model
#   chat_agent           — conversational assistant with memory
#   landscape_planner    — high-level strategic planner
#   refinement_agent     — refines plan based on user feedback
#   skill_selector       — routes request to the appropriate skills
#   orchestrator         — drives the plan→execute→review loop (JSON oracle calls)
#   worker               — LLMAgentBlock that executes each task command with tools

agents:
  # reasoning_effort controls Gemma4's thinking mode on ollama (via litellm mapping).
  # Values "low"/"medium"/"high" enable thinking; anything else (e.g. "none") disables it.
  # Disable for single-shot classifiers/selectors: thinking returns output in a separate
  # reasoning field, leaving message.content empty and causing silent misclassification
  # (ollama issue #15288). Leave unset for planning/execution agents.

  intent_classifier:
    temperature: 0
    max_tokens: 20
    num_ctx: 2048
    reasoning_effort: "none"

  complexity_evaluator:
    temperature: 0
    max_tokens: 64
    num_ctx: 2048
    reasoning_effort: "none"

  chat_agent:
    temperature: 1.0
    max_tokens: 2048
    num_ctx: 8192
    max_heartbeats: 10
    debug: false
    reasoning_effort: "none"

  landscape_planner:
    temperature: 1.0
    num_ctx: 8192
    reasoning_effort: "none"

  refinement_agent:
    temperature: 1.0
    num_ctx: 8192
    reasoning_effort: "none"

  skill_selector:
    temperature: 0
    max_tokens: 64
    num_ctx: 4096
    reasoning_effort: "none"

  orchestrator:
    temperature: 1.0
    num_ctx: 16384
    max_heartbeats: 20  # max tasks in the plan; simple fixes use 1-3, complex projects use 5-10
    debug: false
    strategy: workflow

  worker:
    temperature: 1.0
    max_tokens: 8128
    num_ctx: 16384       # larger context so workers see full files when reading
    reasoning_effort: "none"  # must stay "none": tool_calls field is empty when thinking is on
    debug: false

