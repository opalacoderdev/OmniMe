default: ollama/ministral-3:14b
alternative: ollama/ministral-3:14b

complexity_inference_mode: double
git_strategy: auto

heartbeats_scale_factor: 1

# Global LLM defaults applied to all agents unless overridden below.
llm_defaults:
  temperature: 1.0
  max_tokens: 8128
  num_ctx: 8192

agents:
  intent_classifier:
    temperature: 0
    max_tokens: 20
    num_ctx: 2048
    reasoning_effort: "none"

  complexity_evaluator:
    temperature: 0
    max_tokens: 64
    num_ctx: 2048
    reasoning_effort: "none"

  chat_agent:
    temperature: 1.0
    max_tokens: 2048
    num_ctx: 8192
    max_heartbeats: 10
    debug: false
    reasoning_effort: "none"

  landscape_planner:
    temperature: 1.0
    num_ctx: 8192
    reasoning_effort: "none"

  refinement_agent:
    temperature: 1.0
    num_ctx: 8192
    reasoning_effort: "none"

  skill_selector:
    temperature: 0
    max_tokens: 64
    num_ctx: 4096
    reasoning_effort: "none"

  orchestrator:
    temperature: 1.0
    num_ctx: 16384
    max_heartbeats: 20
    debug: false
    strategy: workflow

  worker:
    temperature: 0.3
    max_tokens: 8128
    num_ctx: 16384
    reasoning_effort: "none"
    debug: false
