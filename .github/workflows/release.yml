name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_target:
        description: 'What to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - windows

jobs:
  build-linux:
    if: github.event_name == 'release' || inputs.build_target == 'all' || inputs.build_target == 'linux'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-0 libsm6 libxext6 libxrender-dev libgl1

      - name: Install Project Dependencies
        run: |
          pip install .

      - name: Build OmniMe ELF
        run: |
          chmod +x build_exe.sh
          ./build_exe.sh

      - name: Tar Executable
        run: |
          tar -czvf OmniMe-linux-x64.tar.gz -C dist OmniMe

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: OmniMe-linux-x64.tar.gz

      - name: Upload Artifact (Manual Run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: OmniMe-linux-x64
          path: OmniMe-linux-x64.tar.gz

  build-windows:
    if: github.event_name == 'release' || inputs.build_target == 'all' || inputs.build_target == 'windows'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Project Dependencies
        shell: pwsh
        run: |
          pip install .

      - name: Build OmniMe EXE
        shell: pwsh
        run: |
          .\build_exe.ps1

      - name: Zip Executable
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\OmniMe" -DestinationPath "OmniMe-windows-x64.zip"

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: OmniMe-windows-x64.zip

      - name: Upload Artifact (Manual Run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: OmniMe-windows-x64
          path: OmniMe-windows-x64.zip
