name: Build and Release

on:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Build OmniMe EXE
        shell: pwsh
        run: |
          .\build_exe.ps1

      - name: Zip Executable
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\OmniMe" -DestinationPath "OmniMe-windows-x64.zip"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: OmniMe-windows-x64.zip
